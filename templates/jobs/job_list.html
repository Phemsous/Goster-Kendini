<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İş İlanları | Göster Kendini</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-danger" href="/">GÖSTER KENDİNİ</a>
            <a href="{% url 'create_job' %}" class="btn btn-danger ...
        </div>
    </nav>

    <div class="container">
        <div class="row mb-5">
            <div class="col-md-8 mx-auto text-center">
                <h1 class="display-5 fw-bold mb-4">Fırsatları Yakala</h1>
                
                <form method="GET" action="/jobs/" class="d-flex shadow-sm">
                    <input class="form-control form-control-lg border-0" type="search" name="q" 
                           placeholder="Rol, proje adı veya anahtar kelime ara..." value="{{ query|default:'' }}">
                    <button class="btn btn-danger px-4" type="submit">ARA</button>
                </form>
            </div>
        </div>

        <div class="row">
            <h3 class="mb-4">Güncel İlanlar</h3>
            {% for job in jobs %}
            <div class="col-md-6 mb-4">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start">
                            <h5 class="card-title fw-bold text-primary">{{ job.title }}</h5>
                            <span class="badge bg-secondary">Yapımcı: {{ job.producer.username }}</span>
                        </div>
                        <p class="card-text mt-3 text-muted">{{ job.description|linebreaks }}</p>
                    </div>
                    <div class="card-footer bg-white border-0 text-muted small">
                        Yayınlanma: {{ job.created_at|date:"d F Y" }}
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12 text-center py-5">
                <p class="text-muted fs-4">Aramanızla eşleşen bir ilan bulunamadı.</p>
                <a href="/jobs/" class="btn btn-link">Tüm İlanları Gör</a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
