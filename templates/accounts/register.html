<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Aramıza Katıl | Göster Kendini</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-body p-4">
                        <h2 class="text-center mb-4 fw-bold">Aramıza Katıl</h2>
                        <form method="POST">
                            {% csrf_token %}
                            {% for field in form %}
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">{{ field.label }}</label>
                                    {{ field }}
                                    {% if field.help_text %}
                                        <div class="form-text text-muted" style="font-size: 0.8rem;">{{ field.help_text }}</div>
                                    {% endif %}
                                    {% for error in field.errors %}
                                        <div class="text-danger small">{{ error }}</div>
                                    {% endfor %}
                                </div>
                            {% endfor %}
                            <button type="submit" class="btn btn-danger btn-lg w-100 mt-3">Kayıt Ol</button>
                        </form>
                        <hr class="my-4">
                        <p class="text-center">Zaten hesabın var mı? <a href="{% url 'login' %}" class="text-danger fw-bold text-decoration-none">Giriş Yap</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
