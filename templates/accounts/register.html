{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">
                    <h2 class="text-center mb-4">Aramıza Katıl</h2>
                    <form method="POST">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-danger w-100">Kayıt Ol</button>
                    </form>
                    <hr>
                    <p class="text-center">
                        Zaten hesabın var mı? 
                        <a href="{% url 'login' %}">Giriş Yap</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
