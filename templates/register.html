<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kayıt Ol | Göster Kendini</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <h2 class="text-center mb-4">Aramıza Katıl</h2>
                        <form method="POST">
                            {% csrf_token %}
                            {{ form.as_p }}
                            <button type="submit" class="btn btn-danger w-100">Kayıt Ol</button>
                        </form>
                        <hr>
                        <p class="text-center">Zaten hesabın var mı? <a href="#">Giriş Yap</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
